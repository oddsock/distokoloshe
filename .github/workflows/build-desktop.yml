name: Build Desktop App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Stage ffmpeg + yt-dlp sidecars (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $triple = (rustc -vV | Select-String '^host: ').ToString().Split(' ')[1]
          $dir = "apps/desktop/src-tauri"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Write-Host "Target triple: $triple"

          $ffmpegZip = "$env:RUNNER_TEMP/ffmpeg.zip"
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile $ffmpegZip
          Expand-Archive -Path $ffmpegZip -DestinationPath "$env:RUNNER_TEMP/ffmpeg-extract" -Force
          $ffmpegExe = Get-ChildItem -Path "$env:RUNNER_TEMP/ffmpeg-extract" -Filter ffmpeg.exe -Recurse | Select-Object -First 1
          if (-not $ffmpegExe) { throw "ffmpeg.exe not found in extracted archive" }
          Copy-Item $ffmpegExe.FullName "$dir/ffmpeg-$triple.exe"

          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "$dir/yt-dlp-$triple.exe"

          # Verify both staged binaries exist with the exact names Tauri expects
          if (-not (Test-Path "$dir/ffmpeg-$triple.exe")) { throw "missing ffmpeg sidecar" }
          if (-not (Test-Path "$dir/yt-dlp-$triple.exe")) { throw "missing yt-dlp sidecar" }
          Get-ChildItem $dir -Filter "ffmpeg-*","yt-dlp-*" | Format-Table Name, Length

      - name: Build desktop app
        run: npx tauri build
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: distokoloshe-windows
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*.sig
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Stage ffmpeg + yt-dlp sidecars (macOS)
        shell: bash
        run: |
          set -euo pipefail
          triple="$(rustc -vV | sed -n 's/host: //p')"
          dir="apps/desktop/src-tauri"
          mkdir -p "$dir"
          echo "Target triple: $triple"

          # evermeet.cx provides a static native ffmpeg build for macOS
          curl -fsSL -o "$RUNNER_TEMP/ffmpeg.zip" "https://evermeet.cx/ffmpeg/getrelease/zip"
          unzip -o "$RUNNER_TEMP/ffmpeg.zip" -d "$RUNNER_TEMP/ffmpeg-extract"
          cp "$RUNNER_TEMP/ffmpeg-extract/ffmpeg" "$dir/ffmpeg-$triple"
          chmod +x "$dir/ffmpeg-$triple"

          curl -fsSL -o "$dir/yt-dlp-$triple" "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos"
          chmod +x "$dir/yt-dlp-$triple"

          # Verify both staged binaries exist with the exact names Tauri expects
          test -f "$dir/ffmpeg-$triple" || { echo "missing ffmpeg sidecar"; exit 1; }
          test -f "$dir/yt-dlp-$triple" || { echo "missing yt-dlp sidecar"; exit 1; }
          ls -la "$dir"/ffmpeg-* "$dir"/yt-dlp-*

      - name: Build desktop app
        run: npx tauri build
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Codesign macOS app
        if: env.MACOS_SIGNING_CERT != ''
        env:
          MACOS_SIGNING_CERT: ${{ secrets.MACOS_SIGNING_CERT }}
          MACOS_SIGNING_CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
        run: |
          CERT_NAME="${MACOS_CERT_IDENTITY:-disTokoloshe Self-Signed}"
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$MACOS_SIGNING_CERT" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$MACOS_SIGNING_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          APP_PATH=$(find apps/desktop/src-tauri/target/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP_PATH" ]; then
            codesign --force --deep --sign "$CERT_NAME" --entitlements apps/desktop/src-tauri/Entitlements.plist "$APP_PATH"
            codesign --verify "$APP_PATH" && echo "Signature verified: $APP_PATH"

            # Re-package signed app for updater
            TAR_PATH=$(find apps/desktop/src-tauri/target/release/bundle/macos -name "*.app.tar.gz" | head -1)
            if [ -n "$TAR_PATH" ]; then
              APP_NAME=$(basename "$APP_PATH")
              tar -czf "$TAR_PATH" -C "$(dirname "$APP_PATH")" "$APP_NAME"
              echo "Re-packaged signed app"
            fi
          fi
          rm -f $RUNNER_TEMP/cert.p12

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: distokoloshe-macos
          path: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          retention-days: 30

  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Stage ffmpeg + yt-dlp sidecars (Linux)
        shell: bash
        run: |
          set -euo pipefail
          triple="$(rustc -vV | sed -n 's/host: //p')"
          dir="apps/desktop/src-tauri"
          mkdir -p "$dir"
          echo "Target triple: $triple"

          # John Van Sickle static build for x86_64 linux
          curl -fsSL -o "$RUNNER_TEMP/ffmpeg.tar.xz" "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz"
          mkdir -p "$RUNNER_TEMP/ffmpeg-extract"
          tar -xf "$RUNNER_TEMP/ffmpeg.tar.xz" -C "$RUNNER_TEMP/ffmpeg-extract" --strip-components=1
          cp "$RUNNER_TEMP/ffmpeg-extract/ffmpeg" "$dir/ffmpeg-$triple"
          chmod +x "$dir/ffmpeg-$triple"

          curl -fsSL -o "$dir/yt-dlp-$triple" "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux"
          chmod +x "$dir/yt-dlp-$triple"

          # Verify both staged binaries exist with the exact names Tauri expects
          test -f "$dir/ffmpeg-$triple" || { echo "missing ffmpeg sidecar"; exit 1; }
          test -f "$dir/yt-dlp-$triple" || { echo "missing yt-dlp sidecar"; exit 1; }
          ls -la "$dir"/ffmpeg-* "$dir"/yt-dlp-*

      - name: Build desktop app
        run: npx tauri build
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Linux installers
        uses: actions/upload-artifact@v4
        with:
          name: distokoloshe-linux
          path: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage.sig
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.exe' -o -name '*.sig' -o -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' -o -name '*.deb' -o -name '*.AppImage' -o -name '*.AppImage.sig' \) -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

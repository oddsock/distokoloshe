<!DOCTYPE html>
<html>
<head><title>DJ Tokoloshe Bot</title></head>
<body>
<script type="importmap">
{
  "imports": {
    "livekit-client": "/node_modules/livekit-client/dist/livekit-client.esm.mjs"
  }
}
</script>
<script type="module">
import {
  Room,
  RoomEvent,
  LocalAudioTrack,
  Track,
  ExternalE2EEKeyProvider,
} from 'livekit-client';

const SAMPLE_RATE = 48000;
const CHANNELS = 2;

let room = null;
let connected = false;
let workletNode = null;

// Monkey-patch RTCPeerConnection to force stereo Opus with music-quality parameters.
// Without this, WebRTC defaults to mono voice-optimized Opus which sounds bad for music.
const origSetLocal = RTCPeerConnection.prototype.setLocalDescription;
RTCPeerConnection.prototype.setLocalDescription = function(desc, ...args) {
  if (desc && desc.sdp) {
    desc.sdp = forceOpusStereo(desc.sdp);
  }
  return origSetLocal.call(this, desc, ...args);
};
const origSetRemote = RTCPeerConnection.prototype.setRemoteDescription;
RTCPeerConnection.prototype.setRemoteDescription = function(desc, ...args) {
  if (desc && desc.sdp) {
    desc.sdp = forceOpusStereo(desc.sdp);
  }
  return origSetRemote.call(this, desc, ...args);
};

let sdpPatchCount = 0;
function forceOpusStereo(sdp) {
  // Find the Opus payload type from the rtpmap line (usually 111 but not guaranteed)
  const opusMatch = sdp.match(/a=rtpmap:(\d+) opus\/48000\/2/);
  if (!opusMatch) return sdp;
  const pt = opusMatch[1];

  const patched = sdp.replace(
    new RegExp(`a=fmtp:${pt} (.+)`, 'g'),
    (match, params) => {
      // Parse existing params into a map, then override with our values
      const map = {};
      for (const kv of params.split(';')) {
        const eq = kv.indexOf('=');
        if (eq > 0) map[kv.slice(0, eq)] = kv.slice(eq + 1);
        else if (kv.trim()) map[kv.trim()] = '';
      }
      // Force music-quality stereo Opus
      map['stereo'] = '1';
      map['sprop-stereo'] = '1';
      map['maxaveragebitrate'] = '256000';
      map['cbr'] = '0';
      map['usedtx'] = '0';

      const p = Object.entries(map)
        .map(([k, v]) => v !== '' ? `${k}=${v}` : k)
        .join(';');
      sdpPatchCount++;
      console.log(`[bot-browser] SDP patched (#${sdpPatchCount}): a=fmtp:${pt} ${p}`);
      return `a=fmtp:${pt} ${p}`;
    }
  );
  return patched;
}

const params = new URLSearchParams(window.location.search);
const wsUrl = params.get('ws_url');
const token = params.get('token');
const e2eeKey = params.get('e2ee_key') || '';
const bridgePort = params.get('bridge_port') || '9222';

async function start() {
  console.log('[bot-browser] Starting...');
  console.log('[bot-browser] LiveKit URL:', wsUrl);
  console.log('[bot-browser] E2EE:', e2eeKey ? 'enabled' : 'disabled');

  const audioCtx = new AudioContext({ sampleRate: SAMPLE_RATE });
  // Ensure stereo output (default may be mono in headless)
  audioCtx.destination.channelCount = CHANNELS;
  audioCtx.destination.channelCountMode = 'explicit';
  audioCtx.destination.channelInterpretation = 'discrete';
  console.log('[bot-browser] AudioContext sampleRate:', audioCtx.sampleRate, 'channels:', audioCtx.destination.channelCount);

  // Register AudioWorklet (runs on dedicated audio thread — no main-thread jitter)
  await audioCtx.audioWorklet.addModule('/pcm-worklet.js');
  workletNode = new AudioWorkletNode(audioCtx, 'pcm-worklet-processor', {
    outputChannelCount: [CHANNELS],
  });

  // Log stats from worklet
  workletNode.port.onmessage = (e) => {
    if (e.data.type === 'stats') {
      console.log(`[bot-browser] ring: ${e.data.fillMs}ms | peak: ${e.data.peakDb}dB (L:${e.data.peakL} R:${e.data.peakR}) | clips: ${e.data.clipCount} | underruns: ${e.data.underruns}`);
    }
  };

  const dest = audioCtx.createMediaStreamDestination();
  dest.channelCount = CHANNELS;
  dest.channelCountMode = 'explicit';
  workletNode.connect(dest);

  const mediaTrack = dest.stream.getAudioTracks()[0];
  // Try to disable browser audio processing (may not be supported on all tracks)
  try {
    await mediaTrack.applyConstraints({
      autoGainControl: false,
      echoCancellation: false,
      noiseSuppression: false,
    });
    console.log('[bot-browser] Audio processing disabled on track');
  } catch (e) {
    console.warn('[bot-browser] Could not apply audio constraints:', e.message);
  }

  // Connect WebSocket bridge (sends PCM to worklet)
  connectBridge(bridgePort, workletNode);

  // Set up E2EE if key provided
  let keyProvider = null;
  let e2eeWorker = null;

  if (e2eeKey) {
    try {
      keyProvider = new ExternalE2EEKeyProvider();
      e2eeWorker = new Worker(
        '/node_modules/livekit-client/dist/livekit-client.e2ee.worker.mjs',
        { type: 'module' },
      );
      console.log('[bot-browser] E2EE worker loaded');
    } catch (err) {
      console.warn('[bot-browser] E2EE worker failed:', err.message);
      keyProvider = null;
      e2eeWorker = null;
    }
  }

  room = new Room({
    adaptiveStream: false,
    dynacast: false,
    publishDefaults: {
      dtx: false,
      red: false,
      audioBitrate: 256_000,
      audioPreset: { maxBitrate: 256_000 },
    },
    ...(e2eeWorker && keyProvider
      ? { e2ee: { keyProvider, worker: e2eeWorker } }
      : {}),
  });

  room.on(RoomEvent.Disconnected, (reason) => {
    console.warn('[bot-browser] Disconnected:', reason);
    connected = false;
    setTimeout(() => reconnect(), 5000);
  });
  room.on(RoomEvent.Reconnecting, () => console.log('[bot-browser] Reconnecting...'));
  room.on(RoomEvent.Reconnected, () => {
    console.log('[bot-browser] Reconnected');
    connected = true;
  });

  console.log('[bot-browser] Connecting to LiveKit...');
  await room.connect(wsUrl, token, { autoSubscribe: false });
  console.log('[bot-browser] Connected to LiveKit room');

  // Enable E2EE after connection
  if (e2eeWorker && keyProvider) {
    try {
      await keyProvider.setKey(e2eeKey);
      room.setE2EEEnabled(true);
      console.log('[bot-browser] E2EE enabled');
    } catch (err) {
      console.warn('[bot-browser] E2EE setup failed:', err.message);
    }
  }

  // Publish audio track with all processing disabled
  const localTrack = new LocalAudioTrack(mediaTrack, undefined, false);
  await room.localParticipant.publishTrack(localTrack, {
    source: Track.Source.Microphone,
    dtx: false,      // No discontinuous transmission
    red: false,       // No redundant encoding
    audioBitrate: 256_000,
  });
  console.log('[bot-browser] Audio track published');

  connected = true;
  window.__BOT_READY = true;
}

function connectBridge(port, node) {
  const ws = new WebSocket(`ws://127.0.0.1:${port}/pcm`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => console.log('[bot-browser] Bridge WebSocket connected');

  ws.onmessage = (event) => {
    // Each message: interleaved Float32 PCM [L, R, L, R, ...]
    // FFmpeg outputs f32le directly — no conversion needed
    const float32 = new Float32Array(event.data);
    node.port.postMessage(float32, [float32.buffer]); // Transfer ownership (zero-copy)
  };

  ws.onclose = () => {
    console.warn('[bot-browser] Bridge closed, reconnecting...');
    setTimeout(() => connectBridge(port, node), 2000);
  };

  ws.onerror = () => console.error('[bot-browser] Bridge error');
}

async function reconnect() {
  try {
    console.log('[bot-browser] Reconnecting...');
    await room.connect(wsUrl, token, { autoSubscribe: false });
    connected = true;
    console.log('[bot-browser] Reconnected');
  } catch (err) {
    console.error('[bot-browser] Reconnect failed:', err.message);
    setTimeout(() => reconnect(), 5000);
  }
}

start().catch(err => console.error('[bot-browser] Fatal:', err));
</script>
</body>
</html>
